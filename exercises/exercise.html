<!DOCTYPE html>

<html>

<head>


    <title>
        exercises
    </title>

        <style>

.name {


    width: 160px;
    font-size: 15px;
    padding: 8px;
    display: inline-block;
    border-radius: 6px;
    border: 1px solid gray;
        font-weight: bold;
        margin-top: 30px;

}




.email {


    width: 340px;
    font-size: 15px;
    padding: 12px;
    margin-top: 20px;
    display: block;
    border-radius: 6px;
    border: 1px solid gray;
        font-weight: bold;

}

.Sub {
    width: 360px;
    height: 40px;
    font-size: 20px;
    font-weight: bold;
    margin-top: 20px;
    background-color: rgb(59, 143, 211);
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;


}


.req {
    font-size: 44px;
    font-weight: bold;
    margin-top: 400px;
    margin-bottom: 20px;
}





.pickup {

display: block;
margin-bottom: 10px;
background-color: rgb(246, 242, 242);
padding: 10px;
width: 350px;
border: none;
border-radius: 10px;
font-size: 16px;
}

.destination {

display: block;
margin-bottom: 10px;
background-color: rgb(246, 242, 242);
padding: 10px;
width: 350px;
border: none;
border-radius: 10px;
font-size: 16px;

}

.ride {

padding: 15px;
background-color: black;
color: white;
border: none;
font-size: 16px;
margin-right: 20px;
margin-top: 20px;
    cursor: pointer;
        display: inline-block;

}


.later {

padding: 15px;
background-color: rgb(246, 242, 242);
color: rgb(0, 0, 0);
border: none;
font-size: 16px;
margin-right: 20px;
    cursor: pointer;
        display: inline-block;

}


.image {
    width: 200px;
    height: 200px;
}



.but{


font-size: 15px;
background-color: #2bbaea;
color: white;
border-radius: 1px;
border: none;
cursor: pointer;
padding-left: 20px;
padding-right: 20px;
padding-top: 10px;
padding-bottom: 10px;





}



.div{


border-radius: 112px;
border-color: #2bbaea;
border-width: 2px;
display: inline-block;
margin-top: 100px;

}

.div2{
display: inline-block;
}






        </style>
    

</head>





<body>
    


<input class="name" type="text" placeholder="First name">

<input class="name" type="text" placeholder="last name">

<input class="email" type="text" placeholder="Email">

<button class="Sub">
    Submit
</button>



<p class="req">
    Request a ride now
</p>

<input class="pickup" type="text" placeholder="Enter pickup location">
<input class="destination" type="text" placeholder="Enter destination">


<button class="ride">
    Request ride
</button>

<button class="later">
    Schedule ride for later
</button>


</div>


</body>

</html>
